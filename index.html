<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sprint League - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Open+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="css/auth.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-left">
        <div class="logo">Sprint<span>League</span></div>
        <nav class="nav">
          <a href="index.html" class="nav-btn active">Dashboard</a>
          <a href="tasks.html" class="nav-btn">Tasks</a>
          <a href="analytics.html" class="nav-btn">Analytics</a>
          <a href="friends.html" class="nav-btn">Friends</a>
          <a href="league.html" class="nav-btn">League</a>
        </nav>
      </div>
      <div class="header-right">
        <div class="user-info">
          <div class="avatar" id="userAvatar">U</div>
          <div class="user-details">
            <div class="username" id="username">User</div>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </header>

    <main class="page">
      <div class="page-header">
        <h1 class="page-title">
          <small>// dashboard</small>
          Welcome Back
        </h1>
        <div class="clock-block">
          <div class="live-clock" id="liveTime">00:00</div>
          <div class="live-date" id="liveDate">Loading...</div>
        </div>
      </div>

      <!-- Quick Stats -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-label">Today's Tasks</div>
          <div class="stat-value accent" id="todayCount">0</div>
          <div class="stat-sub" id="todayProgress">0 completed</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Sprint Score</div>
          <div class="stat-value accent" id="sprintScore">0</div>
          <div class="stat-sub" id="sprintMeta">Last 7 days</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Streak</div>
          <div class="stat-value blue" id="streakCount">0</div>
          <div class="stat-sub">Days active</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total Sprints</div>
          <div class="stat-value accent" id="totalSprints">0</div>
          <div class="stat-sub" id="avgScore">0 avg score</div>
        </div>
      </div>

      <div class="grid-2">
        <!-- Today's Tasks -->
        <div class="panel">
          <div class="panel-title">Today's Tasks</div>
          <div id="todayTasksList" class="task-list">
            <div style="padding: 20px; text-align: center; color: var(--muted);">No tasks yet. <a href="tasks.html">Create one</a></div>
          </div>
        </div>

        <!-- Recent Sprints -->
        <div class="panel">
          <div class="panel-title">Recent Sprints</div>
          <div id="sprintList" class="sprint-list">
            <div style="padding: 20px; text-align: center; color: var(--muted);">No sprints yet</div>
          </div>
        </div>
      </div>
    </main>

  <!-- Scripts -->
  <script src="js/lib/db.js"></script>
  <script src="js/lib/auth.js"></script>
  <script src="js/lib/utils.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/app.js"></script>

  <!-- React Auth UI -->
  <div id="auth-root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="js/auth-ui.js"></script>
</body>
</html>
